<mat-card class="product-card">
  <!-- Image -->
  <img mat-card-image [src]="product.imageUrl"
    [alt]="product.name"
    class="product-image"
    onerror="this.src='https://picsum.photos/400/300'">

  <mat-card-content>
    <!-- Category -->
    <mat-chip-set>
      <mat-chip>{{ product.category }}</mat-chip>
    </mat-chip-set>

    <!-- Name -->
    <h3 class="product-name">{{ product.name }}</h3>

    <!-- Description -->
    <p class="product-desc">{{ product.description }}</p>

    <!-- Price -->
    <p class="product-price">
      {{ product.price | number:'1.0-0' }}đ
    </p>

    <!-- Stock -->
    <p class="product-stock" [class.out-of-stock]="product.stock === 0">
      <mat-icon>inventory</mat-icon>
      {{ product.stock > 0 ? 'Còn ' + product.stock + ' sản phẩm' : 'Hết hàng' }}
    </p>
  </mat-card-content>

  <mat-card-actions>
    <a mat-button color="primary" [routerLink]="['/products', product.id]">
      <mat-icon>visibility</mat-icon>
      Chi tiết
    </a>
    <button mat-raised-button color="primary"
      [disabled]="product.stock === 0"
      (click)="addToCart.emit(product)">
      <mat-icon>add_shopping_cart</mat-icon>
      Thêm vào giỏ
    </button>
  </mat-card-actions>
</mat-card>
